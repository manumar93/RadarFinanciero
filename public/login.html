<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesion | RadarFinanciero</title>
  <link rel="icon" type="image/png" href="/assets/images/logo.png?v=20260514" />
  <link rel="shortcut icon" type="image/png" href="/assets/images/logo.png?v=20260514" />
  <link rel="stylesheet" href="/assets/css/login.css" />
</head>
<body>
  <section class="auth-shell">
    <div class="auth-panel">
      <div class="panel-topline">
        <img src="/assets/images/logo.png" alt="RadarFinanciero" class="auth-brand-logo" />
      </div>
      <h1 style="text-align: center;">Iniciar sesion</h1>
      <p style="text-align: center;">Accede a tu cuenta para guardar carteras, favoritos y consultar tu perfil.</p>

      <form id="loginForm" novalidate>
        <label>
          Email
          <input id="emailInput" type="email" autocomplete="email" required />
        </label>
        <label>
          Contrasena
          <input id="passwordInput" type="password" autocomplete="current-password" required />
        </label>
        <div class="actions">
          <button class="primary" type="submit">Entrar</button>
          <button class="secondary" type="button" id="goHomeBtn">Volver al inicio</button>
        </div>
      </form>

      <div id="errorBox" class="error"></div>
      <div id="successBox" class="success"></div>

      <div class="small-links">
        <a href="/register.html" class="secondary">Crear cuenta</a>
      </div>
    </div>

    <aside class="auth-brand">
      <div class="brand-top">
        <img src="/assets/images/logo.png" alt="RadarFinanciero" style="max-width: 160px; height: auto; border-radius: 10px;" />
      </div>
      <div class="brand-copy">
        <h2>Tu plataforma para analizar fondos y ETFs</h2>
        <p>Accede a tus favoritos y carteras desde cualquier dispositivo.</p>
      </div>
    </aside>
  </section>

  <script src="/assets/js/auth-client.js"></script>
  <script src="/assets/js/login.js"></script>
</body>
</html>
