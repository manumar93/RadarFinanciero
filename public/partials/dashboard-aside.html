<!doctype html>
<!-- dashboard-aside.html COMPLETO -->
<div
  id="overlay"
  class="sidebar-overlay fixed inset-0 bg-black bg-opacity-50 z-[2147483000] md:hidden opacity-0 pointer-events-none transition-opacity duration-200"
></div>
<aside
  id="sidebar"
  class="fixed left-0 top-0 h-full w-full md:w-64 glass-effect sidebar-transition z-[2147483001] overflow-hidden"
>
  <div class="flex flex-col h-full">
    <!-- Logo Section -->
    <div
      class="px-4 md:px-6 py-6 border-b border-gray-700"
      style="padding-top: 0.75rem"
    >
      <div class="flex items-center justify-between">
        <div class="flex items-center space-x-3">
          <img
            src="/assets/images/logo.png"
            alt="RadarFinanciero"
            style="height: 40px; width: auto; border-radius: 8px;"
          />
          <h2 class="text-white font-bold text-lg">RadarFinanciero</h2>
        </div>
        <button
          type="button"
          id="closeSidebar"
          class="md:hidden text-gray-400 hover:text-white"
        >
          <svg
            class="w-6 h-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </button>
      </div>
    </div>
    <!-- Navigation -->
    <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
      <a
        href="/index.html"
        class="nav-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition-all duration-200 group"
      >
        <svg
          class="w-5 h-5 shrink-0"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 13h6V5H4v8zm0 6h6v-4H4v4zm10 0h6V11h-6v8zm0-10h6V5h-6v4z"
          />
        </svg>
        <span class="font-medium">Inicio</span>
      </a>
      <!-- =====================================================
          BLOQUE MIS FAVORITOS
          ===================================================== -->
      <a
        href="/favorites.html"
        class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition-all duration-200 group"
      >
        <svg
          class="w-5 h-5 shrink-0"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="m12 20-1.45-1.32C5.4 14.02 2 10.94 2 7.15C2 4.5 4.1 2.5 6.7 2.5c1.48 0 2.9.7 3.8 1.82A5.03 5.03 0 0 1 14.3 2.5C16.9 2.5 19 4.5 19 7.15c0 3.79-3.4 6.87-8.55 11.53L12 20Z"
          />
        </svg>
        <span class="font-medium">Mis Favoritos</span>
      </a>
      <!-- FIN BLOQUE MIS FAVORITOS -->

      <a
        href="/portfolio.html"
        class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition-all duration-200 group"
      >
        <svg
          class="w-5 h-5 shrink-0"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M5 19V11m7 8V5m7 14v-6"
          />
          <circle cx="5" cy="9" r="2" stroke-width="2" />
          <circle cx="12" cy="3" r="2" stroke-width="2" />
          <circle cx="19" cy="11" r="2" stroke-width="2" />
        </svg>
        <span class="font-medium">Mi cartera</span>
      </a>

      <a
        href="/profile.html"
        class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition-all duration-200 group"
      >
        <svg
          class="w-5 h-5 shrink-0"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15.5 7.5a3.5 3.5 0 1 1-7 0a3.5 3.5 0 0 1 7 0ZM4 19.5a8 8 0 0 1 16 0"
          />
        </svg>
        <span class="font-medium">Mi Perfil</span>
      </a>
      <div class="relative">
        <button
          type="button"
          id="btnPromotions"
          class="w-full flex items-center justify-between px-4 py-3 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition-all duration-200"
        >
          <span class="flex items-center gap-3">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="w-5 h-5 shrink-0"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 18h.01M9.09 9a3 3 0 1 1 5.82 1c0 2-3 3-3 3"
              />
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 22a10 10 0 1 0 0-20a10 10 0 0 0 0 20Z" />
            </svg>
            <span class="font-medium">Ayuda</span>
          </span>
        </button>
      </div>
    </nav>
      <a
        href="/admin.html"
        id="adminNavLink"
        class="hidden flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition-all duration-200 group"
      >
        <svg
          class="w-5 h-5 shrink-0"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"
          />
        </svg>
        <span class="font-medium">Panel Admin</span>
      </a>
    <!-- Logout anclado al fondo -->
    <div class="p-4 pt-2 border-t border-gray-700">
      <a
        href="#"
        id="logoutBtn"
        hidden
        class="logout-session-btn flex items-center space-x-2 transition-all duration-200 group"
      >
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 16l4-4m0 0-4-4m4 4H9m6 7v1a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7a2 2 0 0 1 2 2v1"
          />
        </svg>
        <span class="font-medium">Cerrar sesion</span>
      </a>
    </div>
  </div>
</aside>
<dialog id="logoutDialog" class="fixed inset-0 bg-transparent">
  <div id="logoutDialogBackdrop" class="bg-black/60"></div>
  <div class="flex items-center justify-center p-4 bg-transparent">
    <div
      class="w-full max-w-md rounded-2xl bg-gray-900 border border-gray-700 shadow-2xl overflow-hidden"
    >
      <div class="p-5">
        <p id="ConfirmModalTitle" class="text-base font-semibold text-white">
          ¿Cerrar sesión?
        </p>
        <p id="ConfirmModalText" class="text-sm text-gray-300 mt-2">
          Se le devolverá al login.
        </p>
      </div>
      <div class="px-5 pb-5 flex items-center justify-end gap-2">
        <button
          type="button"
          id="logoutCancel"
          class="px-4 py-2 rounded-xl bg-gray-800 hover:bg-gray-700 text-white text-sm"
        >
          Cancelar
        </button>
        <button
          type="button"
          id="logoutOk"
          class="px-4 py-2 rounded-xl bg-red-600 hover:bg-red-700 text-sm font-medium"
        >
          Cerrar sesión
        </button>
      </div>
    </div>
  </div>
</dialog>
