<!doctype html>
<!-- dashboard-header.html COMPLETO -->
<header
  class="glass-effect sticky top-0 z-[10001] border-b border-gray-700"
  style="z-index: 10001"
>
  <div
    class="flex items-center justify-between px-4 md:px-6 py-4"
    style="min-height: 72px"
    id="header-principal"
  >
    <!-- Left Side -->
    <div class="flex items-center space-x-4">
      <button
        type="button"
        id="menuToggle"
        class="text-gray-400 hover:text-white p-2 rounded-lg hover:bg-gray-800 transition-all duration-200"
      >
        <svg
          class="w-6 h-6"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          />
        </svg>
      </button>
      <div class="flex md:hidden items-center space-x-2">
        <img
          src="/assets/images/logo.png"
          alt="RadarFinanciero"
          style="height: 32px; width: auto; border-radius: 6px;"
        />
      </div>
    </div>

    <!-- Right Side -->
    <div class="flex items-center space-x-2 md:space-x-3">
      <!-- Avatar -->
      <div class="relative" style="min-width: 44px; min-height: 44px">
        <div id="userBlock" class="absolute inset-0 hidden">
          <button
            type="button"
            id="userDropdownToggle"
            class="user-photo-button"
            aria-label="Abrir menu de usuario"
          >
            <img
              src="/assets/images/logo.png"
              alt="RadarFinanciero"
              style="width: 36px; height: 36px; border-radius: 50%; object-fit: cover;"
            />
          </button>
          <div
            id="dropdownMenu"
            class="hidden absolute right-0 mt-3 w-80 transition-all duration-300 z-50"
          >
            <div class="user-menu-head">
              <p id="userName" class="text-white font-semibold"></p>
              <span id="userRoleBadge" class="user-role-badge hidden"></span>
            </div>
            <div class="user-menu-actions">
              <a
                href="/profile.html"
                class="user-menu-link"
              >
                <span class="user-menu-icon" aria-hidden="true">
                  <svg
                    class="w-4 h-4"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M15.75 7.5a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.5 20.25a8.25 8.25 0 1 1 15 0"
                    />
                  </svg>
                </span>
                <span>Mi perfil</span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div
    id="mobileSearch"
    class="hidden lg:hidden border-t border-gray-700 p-4"
  ></div>
</header>
